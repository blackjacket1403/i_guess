<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TUMBLER — a word-heist for a crew of up to four</title>
  <meta name="description" content="Crack the word, rob your crew. A word-guessing heist game for 1–4 players: crack escalating vaults, bank the loot, and spend it to gear up or sabotage your friends.">
  <meta name="theme-color" content="#0B0E11">

  <!-- social card -->
  <meta property="og:title" content="TUMBLER — crack the word, rob your crew">
  <meta property="og:description" content="A word-heist for 1–4 players. Crack vaults, bank loot, freeze and fog your friends. Play right in the browser.">
  <meta property="og:type" content="website">

  <!-- favicon: an inline dial, so no binary files ship -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <button class="brand" title="TUMBLER — home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="11" fill="none" stroke="currentColor" stroke-width="2.4"/><line x1="16" y1="5.5" x2="16" y2="16" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/><circle cx="16" cy="16" r="2.6" fill="currentColor"/></svg>
      </span>
      <span class="brand-word">TUMBLER</span>
    </button>
    <div class="topbar-actions">
      <button class="tbtn" id="btn-how">HOW TO PLAY</button>
      <button class="tbtn" id="btn-sound">SOUND ◎</button>
    </div>
  </header>

  <main id="app"></main>
  <div id="overlay" class="overlay"></div>
  <div id="toast" class="toast"></div>

  <noscript><p style="color:#ECECE6;text-align:center;padding:2rem;font-family:sans-serif">TUMBLER needs JavaScript to run.</p></noscript>

  <script src="js/words.js" defer></script>
  <script src="js/audio.js" defer></script>

  <script src="js/app.js" defer></script>

</html>
